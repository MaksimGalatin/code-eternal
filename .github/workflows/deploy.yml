name: Deploy to Hetzner VM

on:
  push:
    branches: [main]
    paths:
      - 'app/listener/**'
      - 'app/site-gen/**'
      - 'app/docker/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push — listener
        uses: docker/build-push-action@v5
        with:
          context: ./app/listener
          platforms: linux/arm64
          push: true
          no-cache: true
          tags: maxshchuplov/code-eternal-listener:latest

      - name: Build and push — site-gen
        uses: docker/build-push-action@v5
        with:
          context: ./app/site-gen
          platforms: linux/arm64
          push: true
          no-cache: true
          tags: maxshchuplov/code-eternal-site-gen:latest

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: 128.140.0.118
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/code-eternal
            docker compose -f docker/docker-compose.yml pull
            docker compose -f docker/docker-compose.yml up -d
            docker image prune -f
