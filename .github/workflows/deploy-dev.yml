name: Deploy Dev to Hetzner VM

on:
  push:
    branches: [develop]
    paths:
      - 'app/listener/**'
      - 'app/site-gen/**'
      - 'app/docker/**'
  pull_request:
    branches: [develop]
    paths:
      - 'app/listener/**'
      - 'app/site-gen/**'
      - 'app/docker/**'
  workflow_dispatch:

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (for ARM64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build — listener:dev
        uses: docker/build-push-action@v5
        with:
          context: ./app/listener
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          tags: |
            maxshchuplov/code-eternal-listener:dev
            maxshchuplov/code-eternal-listener:dev-${{ github.sha }}

      - name: Build — site-gen:dev
        uses: docker/build-push-action@v5
        with:
          context: ./app/site-gen
          platforms: linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          no-cache: true
          tags: |
            maxshchuplov/code-eternal-site-gen:dev
            maxshchuplov/code-eternal-site-gen:dev-${{ github.sha }}

      - name: Deploy dev containers to VM
        if: github.event_name != 'pull_request'
        uses: appleboy/ssh-action@v1
        with:
          host: 128.140.0.118
          username: root
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/code-eternal
            docker compose -f docker/docker-compose.yml --profile dev pull
            docker compose -f docker/docker-compose.yml --profile dev up -d
            docker image prune -f
