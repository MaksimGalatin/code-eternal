name: CI — Next.js App

on:
  push:
    branches-ignore: [main]
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/package-lock.json'
      - 'app/tsconfig.json'
      - 'app/next.config.js'
  pull_request:
    branches: [develop]
    paths:
      - 'app/src/**'
      - 'app/package.json'
      - 'app/package-lock.json'
      - 'app/tsconfig.json'
      - 'app/next.config.js'

jobs:
  typecheck-and-build:
    name: Type check & build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Stub values — build must succeed without real secrets
          NEXT_PUBLIC_PRIVY_APP_ID: cmp5kf0v000250clabi1awvhp
          NEXT_PUBLIC_PROGRAM_ID: 6EPLCgJA7RQ999rAVntjHSJnWzozPGGkcinZgYt15JXQ
          NEXT_PUBLIC_USDC_MINT: 5f76mcT9Cgo8oRfWDnsHnZjj9ZqvjcqaXPcrEMEbQsy5
          NEXT_PUBLIC_RPC_URL: https://api.devnet.solana.com
          # DATABASE_URL intentionally absent — prebuild migration skips gracefully
