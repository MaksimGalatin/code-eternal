services:
  listener:
    image: maxshchuplov/code-eternal-listener:latest
    restart: unless-stopped
    env_file: ../.env
    environment:
      SITE_GEN_URL: http://site-gen:3002
      NODE_ENV: production
    depends_on:
      - site-gen

  site-gen:
    image: maxshchuplov/code-eternal-site-gen:latest
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production

  app:
    image: maxshchuplov/code-eternal-app:latest
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - app
      - listener
