# Hetzner CAX11 — listener + site-gen + nginx (prod: :latest, dev: :dev)
services:
  listener:
    image: maxshchuplov/code-eternal-listener:latest
    restart: unless-stopped
    env_file: ../.env
    environment:
      SITE_GEN_URL: http://site-gen:3002
      NODE_ENV: production
    depends_on:
      - site-gen

  site-gen:
    image: maxshchuplov/code-eternal-site-gen:latest
    restart: unless-stopped
    env_file: ../.env
    environment:
      NODE_ENV: production

  listener-dev:
    image: maxshchuplov/code-eternal-listener:dev
    profiles: [dev]
    restart: unless-stopped
    env_file: ../.env.dev
    environment:
      SITE_GEN_URL: http://site-gen-dev:3012
      PORT: "3011"
      NODE_ENV: production
    depends_on:
      - site-gen-dev

  site-gen-dev:
    image: maxshchuplov/code-eternal-site-gen:dev
    profiles: [dev]
    restart: unless-stopped
    env_file: ../.env.dev
    environment:
      PORT: "3012"
      NODE_ENV: production

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - listener
      - site-gen
