events { worker_connections 1024; }

http {
  server {
    listen 80;
    server_name listener.codeofdigitaleternity.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name listener.codeofdigitaleternity.com;

    ssl_certificate     /etc/letsencrypt/live/app.codeofdigitaleternity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.codeofdigitaleternity.com/privkey.pem;

    # Helius webhooks → listener:3001
    location /webhook/ {
      proxy_pass http://listener:3001;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Site-gen jobs endpoint — called by Vercel (auth via SITE_GEN_SECRET Bearer token)
    location /jobs {
      proxy_pass http://site-gen:3002;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check passthrough
    location /health {
      proxy_pass http://site-gen:3002;
    }
  }

  # ── Dev environment ──────────────────────────────────────────────────────────

  server {
    listen 80;
    server_name dev.listener.codeofdigitaleternity.com;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name dev.listener.codeofdigitaleternity.com;

    ssl_certificate     /etc/letsencrypt/live/dev.listener.codeofdigitaleternity.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.listener.codeofdigitaleternity.com/privkey.pem;

    # Docker internal DNS — resolves at request time so nginx starts without dev containers
    resolver 127.0.0.11 valid=10s;

    location /webhook/ {
      set $upstream_listener http://listener-dev:3011;
      proxy_pass $upstream_listener;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jobs {
      set $upstream_sitegen http://site-gen-dev:3012;
      proxy_pass $upstream_sitegen;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
      set $upstream_sitegen http://site-gen-dev:3012;
      proxy_pass $upstream_sitegen;
    }
  }
}
