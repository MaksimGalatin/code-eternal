version: "3.9"

services:
  listener:
    build:
      context: ../listener
      target: production
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      AWS_REGION: us-east-1
      PROGRAM_ID: ${PROGRAM_ID}
      HELIUS_RPC_URL: ${HELIUS_RPC_URL}
      SQS_QUEUE_URL: http://localstack:4566/000000000000/code-eternal-jobs.fifo
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/code_eternal
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped

  site-gen:
    build:
      context: ../site-gen
      target: production
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: development
      AWS_REGION: us-east-1
      PROGRAM_ID: ${PROGRAM_ID}
      HELIUS_RPC_URL: ${HELIUS_RPC_URL}
      SQS_QUEUE_URL: http://localstack:4566/000000000000/code-eternal-jobs.fifo
      IRYS_PRIVATE_KEY: ${IRYS_PRIVATE_KEY}
      BACKEND_PRIVATE_KEY: ${BACKEND_PRIVATE_KEY}
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/code_eternal
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_eternal
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # LocalStack emulates SQS locally — no AWS account needed for dev
  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEFAULT_REGION: us-east-1
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:4566/_localstack/health | grep -q '\"sqs\": \"running\"'"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - localstack_data:/var/lib/localstack

volumes:
  pg_data:
  localstack_data:
